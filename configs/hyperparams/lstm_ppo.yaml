# ===============================
# LSTM PPO Agent Hyperparameters
# ===============================

# Total training steps
total_timesteps: 2

# Vectorize environment for stability? (False = use single env)
use_vec_env: false

# PPO Hyperparameters
learning_rate: 0.0003
gamma: 1.0               # no discounting, finite horizon episodic trading
n_steps: 512             # must be <= episode length for RecurrentPPO
batch_size: 128
ent_coef: 0.0
vf_coef: 0.5
clip_range: 0.2
gae_lambda: 0.95

# Logging
verbose: 1
tensorboard_log: null

# ===============================
# LSTM Network Architecture
# ===============================
policy_kwargs:
    lstm_hidden_size: 128    # hidden units in LSTM
    n_lstm_layers: 1         # one LSTM layer is usually enough
    shared_lstm: false       # separate actor & critic LSTM
    net_arch: [64, 64]       # MLP after LSTM
    activation_fn: ReLU
