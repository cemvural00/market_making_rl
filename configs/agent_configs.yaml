# ============================================================
# Heuristic Agents: Avellaneda-Stoikov (AS)
# ============================================================

as_closed_form:
  # AS closed-form optimal agent
  # Note: These parameters must match the environment!
  gamma: 0.1              # Risk aversion parameter
  sigma: 2.0              # Must match env.sigma (for ABM/OU)
  k: 1.5                  # Must match env.k (order flow decay)
  base_delta: 1.0         # Must match env.base_delta
  max_inventory: 20       # Must match env.max_inventory
  T: 1.0                  # Must match env.T

as_closed_form_gbm:
  # AS agent for GBM environments
  # Note: For GBM, sigma is percentage-based
  gamma: 0.1
  sigma: 0.02             # 2% volatility (matches gbm_vanilla)
  k: 1.5
  base_delta: 1.0
  max_inventory: 20
  T: 1.0

as_simple_heuristic:
  # Simple AS-inspired heuristic (not closed-form)
  gamma: 0.1              # Inventory sensitivity
  min_spread_factor: 0.2
  max_spread_factor: 0.8
  max_inventory: 20

# ============================================================
# Heuristic Agents: Fixed Spread
# ============================================================

fixed_spread:
  # Fixed spread agent (symmetric quotes)
  fixed_multiplier: 1.0    # delta = multiplier * base_delta
  base_delta: 1.0         # Should match env.base_delta

fixed_spread_wide:
  # Wider fixed spread
  fixed_multiplier: 1.5
  base_delta: 1.0

fixed_spread_narrow:
  # Narrower fixed spread
  fixed_multiplier: 0.5
  base_delta: 1.0

# ============================================================
# Heuristic Agents: Inventory-Based
# ============================================================

inventory_shift:
  # Inventory-based quote shifting
  beta: 0.05              # Skew sensitivity
  max_inventory: 20

inventory_shift_aggressive:
  # More aggressive inventory management
  beta: 0.1
  max_inventory: 20

inventory_shift_conservative:
  # More conservative inventory management
  beta: 0.02
  max_inventory: 20

inventory_spread_scaler:
  # Spread increases with inventory
  alpha: 0.05              # Spread sensitivity to inventory
  max_inventory: 20
  base_delta: 1.0         # Should match env.base_delta

# ============================================================
# Heuristic Agents: Trend/Momentum-Based
# ============================================================

last_look:
  # Last-look quoting based on short-term momentum
  trend_sensitivity: 0.5   # Controls how strongly agent reacts to dS

mid_price_follow:
  # Mid-price-following agent (signal-based)
  trend_sensitivity: 0.5   # Strength of reaction to dS
  max_skew: 1.0            # Max allowed skew before clipping

# ============================================================
# Heuristic Agents: Market Orders
# ============================================================

market_order_only:
  # Market-order-only behavior (emulated via minimal spread)
  max_inventory: 20

# ============================================================
# Heuristic Agents: Noise Traders
# ============================================================

noise_trader_normal:
  # Noise agent drawing spread/skew from Gaussian distributions
  spread_std: 0.3          # Standard deviation for spread factor
  skew_std: 0.3            # Standard deviation for skew factor

# Note: noise_trader_uniform and zero_intelligence use defaults (no config needed)

# ============================================================
# Quick Test Configs (for debugging)
# ============================================================

ppo_test:
  # Minimal config for quick tests
  total_timesteps: 1000
  use_vec_env: false
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 64
  batch_size: 32
  verbose: 1

lstm_ppo_test:
  # Minimal LSTM config for quick tests
  total_timesteps: 1000
  use_vec_env: false
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 64
  batch_size: 32
  policy_kwargs:
    lstm_hidden_size: 32
    n_lstm_layers: 1
    shared_lstm: false
    net_arch: [16, 16]
  verbose: 1
