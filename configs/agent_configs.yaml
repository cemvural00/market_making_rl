# ============================================================
# Agent Configuration Presets
# ============================================================
# This file contains preset configurations for different
# agent types. Use these for reproducible experiments.
#
# Usage:
#   from configs.config_loader import load_yaml_config
#   agent_cfg = load_yaml_config("configs/agent_configs.yaml")["ppo_basic"]
#   agent = PPOAgent(env, config=agent_cfg)
# ============================================================

# ============================================================
# RL Agents: PPO (Proximal Policy Optimization)
# ============================================================

ppo_basic:
  # Standard PPO agent with default MLP policy
  total_timesteps: 150000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  # PPO hyperparameters
  learning_rate: 0.0003
  gamma: 1.0              # No discounting (finite horizon episodic)
  n_steps: 1024           # Steps per update
  batch_size: 256
  n_epochs: 5             # Optimization epochs per update (reduced for faster training)
  ent_coef: 0.01          # Entropy coefficient
  vf_coef: 0.5            # Value function coefficient
  clip_range: 0.2         # PPO clipping range
  gae_lambda: 0.95        # GAE lambda
  
  # Early stopping (optional)
  early_stopping:
    enabled: true
    monitor_type: "reward"      # "reward" (recommended) or "loss"
    monitor: "mean_reward"      # "mean_reward", "mean_pnl", or loss metric name
    patience: 6                 # Number of evaluations without improvement (reduced for faster stopping)
    min_delta: 0.0              # Minimum change to qualify as improvement
    mode: "max"                 # "max" for reward/PnL, "min" for loss
    verbose: 1
    eval_freq: 10000            # Evaluate every 10k steps (reduced frequency for faster training)
    n_eval_episodes: 5         # Number of episodes per evaluation (reduced for faster training)
    best_model_path: null       # Path to save best model (None = temp directory)
  
  # Logging
  verbose: 1
  tensorboard_log: null   # Set to "logs/ppo_basic" to enable TensorBoard

ppo_deep:
  # PPO with deeper network (3 layers of 256 units)
  total_timesteps: 200000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 1024
  batch_size: 256
  n_epochs: 5             # Optimization epochs per update (reduced for faster training)
  ent_coef: 0.01
  vf_coef: 0.5
  clip_range: 0.2
  gae_lambda: 0.95
  
  # Deep network architecture
  policy_kwargs:
    net_arch: [256, 256, 256]
    activation_fn: ReLU
  
  # Early stopping (optional)
  early_stopping:
    enabled: true
    monitor_type: "reward"      # "reward" (recommended) or "loss"
    monitor: "mean_reward"      # "mean_reward", "mean_pnl", or loss metric name
    patience: 6                 # Number of evaluations without improvement (reduced for faster stopping)
    min_delta: 0.0              # Minimum change to qualify as improvement
    mode: "max"                 # "max" for reward/PnL, "min" for loss
    verbose: 1
    eval_freq: 10000            # Evaluate every 10k steps (reduced frequency for faster training)
    n_eval_episodes: 5         # Number of episodes per evaluation (reduced for faster training)
    best_model_path: null       # Path to save best model (None = temp directory)
  
  verbose: 1
  tensorboard_log: null

ppo_fast:
  # Faster training (fewer steps, smaller batch)
  # Useful for quick tests and debugging
  total_timesteps: 50000
  use_vec_env: false
  
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 512
  batch_size: 128
  n_epochs: 5
  ent_coef: 0.01
  vf_coef: 0.5
  clip_range: 0.2
  gae_lambda: 0.95
  
  verbose: 1
  tensorboard_log: null

ppo_with_early_stopping:
  # PPO with early stopping enabled
  # Example configuration showing how to use early stopping
  total_timesteps: 200000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 1024
  batch_size: 256
  n_epochs: 5             # Optimization epochs per update (reduced for faster training)
  ent_coef: 0.01
  vf_coef: 0.5
  clip_range: 0.2
  gae_lambda: 0.95
  
  # Early stopping enabled
  early_stopping:
    enabled: true
    monitor_type: "reward"      # "reward" (recommended) or "loss"
    monitor: "mean_reward"
    patience: 6                 # Number of evaluations without improvement (reduced for faster stopping)
    min_delta: 0.001            # Require at least 0.001 improvement
    mode: "max"
    verbose: 1
    eval_freq: 10000            # Evaluate every 10k steps (reduced frequency for faster training)
    n_eval_episodes: 5         # Number of episodes per evaluation (reduced for faster training)
    best_model_path: null
  
  verbose: 1
  tensorboard_log: null

# ============================================================
# RL Agents: LSTM-PPO (Recurrent PPO)
# ============================================================

lstm_ppo:
  # LSTM-based PPO for temporal dependencies
  total_timesteps: 200000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  # PPO hyperparameters
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 512            # Must be <= episode length for RecurrentPPO
  batch_size: 128
  n_epochs: 5             # Optimization epochs per update (reduced for faster training)
  ent_coef: 0.0           # Often set to 0 for LSTM
  vf_coef: 0.5
  clip_range: 0.2
  gae_lambda: 0.95
  
  # LSTM architecture
  policy_kwargs:
    lstm_hidden_size: 128
    n_lstm_layers: 1
    shared_lstm: false    # Separate actor & critic LSTM
    net_arch: [64, 64]    # MLP layers after LSTM
    activation_fn: ReLU
  
  # Early stopping (optional)
  early_stopping:
    enabled: true
    monitor_type: "reward"      # "reward" (recommended) or "loss"
    monitor: "mean_reward"      # "mean_reward", "mean_pnl", or loss metric name
    patience: 6                 # Number of evaluations without improvement (reduced for faster stopping)
    min_delta: 0.0              # Minimum change to qualify as improvement
    mode: "max"                 # "max" for reward/PnL, "min" for loss
    verbose: 1
    eval_freq: 5000             # Evaluate every 5k steps (reduced frequency for faster training)
    n_eval_episodes: 5         # Number of episodes per evaluation (reduced for faster training)
    best_model_path: null       # Path to save best model (None = temp directory)
  
  verbose: 1
  tensorboard_log: null

lstm_ppo_large:
  # Larger LSTM network
  total_timesteps: 250000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  learning_rate: 0.0003
  gamma: 1.0
  n_steps: 512
  batch_size: 128
  n_epochs: 5             # Optimization epochs per update (reduced for faster training)
  ent_coef: 0.0
  vf_coef: 0.5
  clip_range: 0.2
  gae_lambda: 0.95
  
  policy_kwargs:
    lstm_hidden_size: 256
    n_lstm_layers: 2
    shared_lstm: false
    net_arch: [128, 128]
    activation_fn: ReLU
  
  verbose: 1
  tensorboard_log: null

# ============================================================
# RL Agents: SAC (Soft Actor-Critic)
# ============================================================

sac_basic:
  # Standard SAC agent with default MLP policy
  total_timesteps: 200000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  # SAC hyperparameters
  learning_rate: 0.0003
  gamma: 1.0              # No discounting (finite horizon episodic)
  buffer_size: 100000     # Replay buffer size
  learning_starts: 100    # Steps before learning begins
  batch_size: 256
  tau: 0.005              # Soft update coefficient
  train_freq: 1           # Update every step
  gradient_steps: 1       # Gradient steps per update
  ent_coef: "auto"        # Entropy coefficient (auto-tuned)
  
  # Early stopping (optional)
  early_stopping:
    enabled: true
    monitor_type: "reward"      # "reward" (recommended) or "loss"
    monitor: "mean_reward"      # "mean_reward", "mean_pnl", or loss metric name
    patience: 6                 # Number of evaluations without improvement (reduced for faster stopping)
    min_delta: 0.0              # Minimum change to qualify as improvement
    mode: "max"                 # "max" for reward/PnL, "min" for loss
    verbose: 1
    eval_freq: 10000            # Evaluate every 10k steps (reduced frequency for faster training)
    n_eval_episodes: 5         # Number of episodes per evaluation (reduced for faster training)
    best_model_path: null       # Path to save best model (None = temp directory)
  
  verbose: 1
  tensorboard_log: null

sac_large_buffer:
  # SAC with larger replay buffer
  total_timesteps: 200000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  learning_rate: 0.0003
  gamma: 1.0
  buffer_size: 500000     # Larger buffer for more diverse samples
  learning_starts: 1000   # More exploration before learning
  batch_size: 256
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  
  # Early stopping (optional)
  early_stopping:
    enabled: true
    monitor_type: "reward"      # "reward" (recommended) or "loss"
    monitor: "mean_reward"      # "mean_reward", "mean_pnl", or loss metric name
    patience: 6                 # Number of evaluations without improvement (reduced for faster stopping)
    min_delta: 0.0              # Minimum change to qualify as improvement
    mode: "max"                 # "max" for reward/PnL, "min" for loss
    verbose: 1
    eval_freq: 10000            # Evaluate every 10k steps (reduced frequency for faster training)
    n_eval_episodes: 5         # Number of episodes per evaluation (reduced for faster training)
    best_model_path: null       # Path to save best model (None = temp directory)
  
  verbose: 1
  tensorboard_log: null

# ============================================================
# RL Agents: TD3 (Twin Delayed DDPG)
# ============================================================

td3_basic:
  # Standard TD3 agent
  total_timesteps: 200000  # Reduced - early stopping handles convergence
  use_vec_env: false
  
  # TD3 hyperparameters
  learning_rate: 0.0003
  gamma: 1.0              # No discounting (finite horizon episodic)
  buffer_size: 100000     # Replay buffer size
  learning_starts: 100    # Steps before learning begins
  batch_size: 256
  tau: 0.005              # Soft update coefficient
  train_freq: 1           # Update every step
  gradient_steps: 1       # Gradient steps per update
